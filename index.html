<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专业电势转换工具 | 科研专用 | 参比电极互转</title>
    <style>
        :root {
            --primary: #165DFF;
            --primary-light: #E8F3FF;
            --secondary: #36CFC9;
            --gray-100: #F5F7FA;
            --gray-200: #E5E6EB;
            --gray-300: #C9CDD4;
            --gray-600: #4E5969;
            --gray-800: #1D2129;
            --white: #FFFFFF;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            --radius: 12px;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--gray-100);
            color: var(--gray-800);
            line-height: 1.6;
            padding: 2rem 0;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header h1 {
            color: var(--gray-800);
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .header p {
            color: var(--gray-600);
            font-size: 0.95rem;
        }

        /* 新增：单位切换样式 */
        .unit-switch {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            margin-bottom: 2rem;
            padding: 0.8rem;
            background: var(--gray-100);
            border-radius: var(--radius);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .unit-btn {
            padding: 0.6rem 1.2rem;
            border: 1px solid var(--gray-300);
            border-radius: 8px;
            background: var(--white);
            color: var(--gray-600);
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .unit-btn.active {
            background: var(--primary);
            color: var(--white);
            border-color: var(--primary);
            box-shadow: 0 2px 8px rgba(22, 93, 255, 0.3);
        }

        /* 新增：说明板块样式 */
        .intro-section {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 2rem;
            margin-bottom: 1.5rem;
        }

        .intro-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .intro-title i {
            font-size: 1.3rem;
        }

        .intro-content {
            font-size: 0.95rem;
            color: var(--gray-800);
            line-height: 1.7;
            margin-bottom: 1.5rem;
        }

        .intro-content p {
            margin-bottom: 0.8rem;
        }

        .formula-explain {
            background: var(--primary-light);
            border-radius: 8px;
            padding: 1.2rem;
            margin-top: 1rem;
        }

        .formula-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 0.8rem;
        }

        .formula-table th, .formula-table td {
            padding: 0.8rem 1rem;
            text-align: left;
            border-bottom: 1px solid var(--gray-200);
        }

        .formula-table th {
            color: var(--primary);
            font-weight: 600;
            background: rgba(255,255,255,0.5);
        }

        .formula-table tr:last-child td {
            border-bottom: none;
        }

        /* 核心功能区样式 */
        .card {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 2rem;
            margin-bottom: 1.5rem;
            transition: var(--transition);
        }

        .card:hover {
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--gray-800);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: var(--primary);
            border-radius: 2px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.2rem;
            margin-bottom: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-size: 0.9rem;
            color: var(--gray-600);
            font-weight: 500;
        }

        .form-control {
            padding: 0.9rem 1rem;
            border: 1px solid var(--gray-200);
            border-radius: 8px;
            font-size: 1rem;
            transition: var(--transition);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .btn {
            padding: 0.9rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: var(--primary);
            color: var(--white);
        }

        .btn-primary:hover {
            background: #0F4CD2;
        }

        .btn-secondary {
            background: var(--secondary);
            color: var(--white);
        }

        .btn-secondary:hover {
            background: #2FB8B2;
        }

        /* 结果展示区样式 */
        .result-section {
            background: var(--primary-light);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .result-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .result-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }

        .result-table th, .result-table td {
            padding: 0.8rem 1rem;
            text-align: left;
            border-bottom: 1px solid var(--gray-200);
        }

        .result-table th {
            color: var(--gray-600);
            font-weight: 500;
            background: rgba(255, 255, 255, 0.6);
        }
